<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header class="navbar">
<div class="logo">📚 PageTurner</div>
</header>

<section class="cart-page">

<h1>Shopping Cart</h1>

<div class="cart-layout">

<div id="cartItems" class="cart-items"></div>

<div class="cart-summary">

<h2>Order Summary</h2>

<div id="summaryItems"></div>

<div class="summary-row">
<span>Subtotal</span>
<span>₹<span id="cartTotal">0</span></span>
</div>

<div class="summary-row">
<span>Shipping</span>
<span class="free">Free</span>
</div>

<hr>

<div class="summary-total">
<span>Total</span>
<span>₹<span id="cartTotalFinal">0</span></span>
</div>

<a href="checkout.html">
<button class="checkout-btn">
Proceed to Checkout
</button>
</a>

</div>

</div>

</section>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

const container = document.getElementById("cartItems")
const totalBox = document.getElementById("cartTotal")
const totalFinal = document.getElementById("cartTotalFinal")

function renderCart(){

container.innerHTML = ""

let total = 0

if(cart.length === 0){
container.innerHTML = "<p>Your cart is empty</p>"
totalBox.innerText = 0
totalFinal.innerText = 0
return
}

cart.forEach(item => {

const div = document.createElement("div")

div.className = "cart-item"

div.innerHTML = `

<img src="${item.image}" width="70">

<div class="cart-info">

<h3>${item.title}</h3>
<p>${item.author}</p>
<p class="price">₹${item.price}</p>

</div>

<div class="qty">

<button onclick="changeQty(${item.id}, -1)">−</button>
<span>${item.quantity}</span>
<button onclick="changeQty(${item.id}, 1)">+</button>

</div>

<button class="remove" onclick="removeItem(${item.id})">
🗑
</button>

`

container.appendChild(div)

total += item.price * item.quantity

})

totalBox.innerText = total
totalFinal.innerText = total

localStorage.setItem("cart", JSON.stringify(cart))

}

function changeQty(id, change){

const item = cart.find(b => b.id === id)

if(!item) return

item.quantity += change

if(item.quantity <= 0){
cart = cart.filter(b => b.id !== id)
}

renderCart()

}

function removeItem(id){

cart = cart.filter(item => item.id !== id)

renderCart()

}

renderCart()

</script>

</body>
</html>
